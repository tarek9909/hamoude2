name: storefront_template
description: "Universal customer storefront template driven by store slug configuration."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  http: ^1.2.1
  shared_preferences: ^2.3.2
  image_picker: ^1.2.2
  webview_flutter: ^4.8.0
  rename: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  icons_launcher: ^3.1.0

icons_launcher:
  image_path: "assets/images/logo.png"
  platforms:
    android:
      enable: true
      adaptive_background_color: "#000000"
      adaptive_foreground_image: "assets/images/logo.png"
    ios:
      enable: true

flutter:
  uses-material-design: true

  assets:
    - assets/splash_logo.png
