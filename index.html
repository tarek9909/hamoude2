    // Action: Place Order
    function placeOrder() {
      const card = document.getElementById('card-num').value.trim();
      const cvv = document.getElementById('card-cvv').value.trim();
      if (!card || !cvv) {
        alert("Please complete secure payment credentials.");
        return;
      }

      const subtotal = cart.reduce((sum, item) => sum + item.product.price * item.quantity, 0);
      const deliveryFee = subtotal >= 75.0 ? 0.0 : 10.0;
      const discount = subtotal >= 100.0 ? subtotal * 0.15 : 0.0;
      const total = subtotal + deliveryFee - discount;

      const orderId = "SC-8921"; // Matches Stitch reference
      orders.unshift({
        id: orderId,
        items: [...cart],
        subtotal,
        deliveryFee,
        discount,
        total,
        deliveryType: activeFulfillment,
        status: "Preparing",
        createdAt: new Date().toLocaleString(),
        address: activeFulfillment === "Delivery" ? "485 Botanical Boulevard, Suite 12, West End" : selectedBranch
      });

      // Clear Cart
      cart = [];
      updateCartBadge();
      closeCheckout();

      // Show confirmation dialog
      showOrderSuccessDialog(orderId);
    }

    function sendChatMessage(ticketId) {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      const t = tickets.find(tick => tick.id === ticketId);
      t.messages.push({
        sender: "customer",
        content: text,
        timestamp: "Just now"
      });
      input.value = "";

      // Re-render chat
      const stream = document.getElementById('chat-stream');
      const div = document.createElement('div');
      div.className = "flex flex-col items-end";
      div.innerHTML = `
        <div class="p-3 rounded-2xl max-w-[80%] text-xs leading-relaxed bg-brand-dark text-white rounded-br-none">

          ${text}
        </div>

      stream.appendChild(div);
      stream.scrollTop = stream.scrollHeight;

      // Mock helpful Expert response
      setTimeout(() => {
        const reply = "Thank you for the details. We are processing your request. Please let us know if there's anything else you would like to add.";
        t.messages.push({
          sender: "staff",

        stream.appendChild(replyDiv);
        stream.scrollTop = stream.scrollHeight;
      }, 1500);
    }

      modal.className = 'absolute inset-0 bg-black/40 z-50 flex items-end justify-center backdrop-blur-[2px]';
      modal.innerHTML = `
        <div class="bg-white rounded-t-3xl p-6 w-full max-w-[390px] space-y-4 border-t border-brand-border/60 pb-10">
          <div class="flex justify-between items-center">
            <h3 class="font-serif text-base font-bold">Select Boutique Branch</h3>
            <button onclick="closeBranchSelector()"><svg class="w-5 h-5 text-brand-slate" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg></button>
          </div>
          <p class="text-[10px] text-brand-slate leading-normal">Skincare routine collections vary slightly depending on branch locations.</p>
          <div class="space-y-2 mt-2">
            ${branches.map(b => `
              <div onclick="selectBranch('${b}')" class="p-3 bg-brand-bg border rounded-xl flex justify-between items-center cursor-pointer transition-colors ${selectedBranch === b ? 'border-brand-dark bg-zinc-50 font-bold' : 'border-brand-border/40'}">
                <span class="text-xs">${b}</span>
                ${selectedBranch === b ? '<svg class="w-4.5 h-4.5 text-brand-dark" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4.5 12.75l6 6 9-13.5"/></svg>' : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `;

      document.getElementById('app').appendChild(modal);
    }

    function closeBranchSelector() {
      const modal = document.getElementById('branch-modal');
      if (modal) modal.remove();
    }

    function selectBranch(branch) {
      selectedBranch = branch;
      closeBranchSelector();
      renderScreen();
    }

    // ==========================================
    // 📖 DAILY WELLNESS STORY MODAL
    // ==========================================
    function openStory(title, image, tip) {
      const modal = document.createElement('div');
      modal.id = 'story-modal';
      modal.className = 'absolute inset-0 bg-black/40 z-50 flex items-center justify-center p-6 backdrop-blur-sm';
      modal.innerHTML = `
        <div class="bg-brand-bg rounded-2xl overflow-hidden w-full max-w-[320px] border border-brand-border/60">
          <div class="h-44 bg-zinc-200">
            <img src="${image}" class="object-cover w-full h-full"/>
          </div>
          <div class="p-6 text-center space-y-3">
            <h3 class="font-serif text-lg font-bold">${title}</h3>
            <p class="text-xs text-brand-dark leading-relaxed">${tip}</p>
            <button onclick="closeStory()" class="w-full bg-brand-dark text-white py-2.5 rounded-full text-xs font-bold mt-4 shadow-sm">GOT IT</button>
          </div>
        </div>
      `;
      document.getElementById('app').appendChild(modal);
    }

    function closeStory() {
      const modal = document.getElementById('story-modal');
      if (modal) modal.remove();
    }

    // ==========================================
    // 🔔 UTILITIES & CORE CART ACTIONS
    // ==========================================
    function addToCart(productId, silent = false) {
      const p = products.find(prod => prod.id === productId);
      const existing = cart.find(item => item.product.id === productId);
      
      if (existing) {
        if (existing.quantity < p.stockQuantity) {
          existing.quantity++;
        } else {
          alert(`Only ${p.stockQuantity} items in stock.`);
          return;
        }
      } else {
        cart.push({ product: p, quantity: 1 });
      }

      updateCartBadge();
      if (!silent) {
        showToast(`${p.name} added to bag`);
      }
    }

    function removeFromCart(productId) {
      cart = cart.filter(item => item.product.id !== productId);
      updateCartBadge();
      renderScreen();
    }

    function updateQty(productId, diff) {
      const item = cart.find(i => i.product.id === productId);
      if (item) {
        const nextQty = item.quantity + diff;
        if (nextQty <= 0) {
          removeFromCart(productId);
        } else if (nextQty <= item.product.stockQuantity) {
          item.quantity = nextQty;
          updateCartBadge();
          renderScreen();
        } else {
          alert(`Only ${item.product.stockQuantity} items in stock.`);
        }
      }
    }

    function clearCart() {
      cart = [];
      updateCartBadge();
      renderScreen();
    }

    function updateCartBadge() {
      const count = cart.reduce((sum, item) => sum + item.quantity, 0);
      const badge = document.getElementById('cart-badge');
      if (count > 0) {
        badge.innerText = count;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }

    // Dynamic Toast Notification with bag redirect
    function showToast(message) {
      // Remove any existing toast
      const oldToast = document.getElementById('toast');
      if (oldToast) oldToast.remove();

      const toast = document.createElement('div');
      toast.id = 'toast';
      toast.className = 'absolute top-16 left-4 right-4 bg-brand-dark/95 backdrop-blur-sm text-white px-5 py-3.5 rounded-xl shadow-lg border border-white/10 flex justify-between items-center z-50 animate-bounce';
      
      toast.innerHTML = `
        <span class="text-[11px] font-bold truncate w-48">${message}</span>
        <button onclick="closeToastAndGoToBag()" class="text-brand-gold text-[10px] font-extrabold tracking-wider hover:opacity-90 shrink-0">VIEW BAG</button>
      `;

      document.getElementById('app').appendChild(toast);
      
      // Auto dismiss after 3 seconds
      setTimeout(() => {
        const t = document.getElementById('toast');
        if (t) t.remove();
      }, 3000);
    }

    function closeToastAndGoToBag() {
      const t = document.getElementById('toast');
      if (t) t.remove();
      navigate(1); // Switch to Bag tab
    }

    // Bootstrap app
    navigate(0);
  </script>
</body>
</html>
